version: "3.9"

services:
  flask-app:
    build: .
    ports:
      - "5000:5000"
    command: >
      uv run
      gunicorn main:app
      --bind 0.0.0.0:5000
      -w 4
      --worker-class gthread
      --threads 20
      --access-logfile -
      --error-logfile -
      --log-level info
    cpus: 1.0
